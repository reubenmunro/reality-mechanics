<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minimal Ark</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <p>Minimal Ark</p>
        <h1>Enter. Encounter. Move.</h1>
      </header>

      <section class="controls">
        <button id="enter" type="button">Enter Ark</button>
        <p id="status" role="status">Waiting.</p>
      </section>

      <section class="entry">
        <h2 id="entry-title">No encounter yet.</h2>
        <div id="related" class="related"></div>
      </section>

      <section class="responses">
        <h2>Symbolic responses</h2>
        <div id="inhabitants"></div>
      </section>

      <section class="event">
        <h2>Current structural event</h2>
        <pre id="event"></pre>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
