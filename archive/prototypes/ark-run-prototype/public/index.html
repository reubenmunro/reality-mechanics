<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ark Run</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="top">
        <div>
          <p class="eyebrow">Pressure -> Trace -> Check -> Determine -> Step</p>
          <h1>ARK RUN</h1>
        </div>
        <button id="refresh" type="button">Review runs</button>
      </header>

      <form id="run-form" class="runtime">
        <label>
          <span>Pressure</span>
          <small>What is trying to determine right now?</small>
          <textarea name="pressure" placeholder="I feel pressure to determine..." required></textarea>
        </label>

        <label>
          <span>Current posture</span>
          <small>Where am I currently standing / what am I assuming?</small>
          <textarea name="currentPosture" placeholder="I am currently standing in..."></textarea>
        </label>

        <label>
          <span>Retrace</span>
          <small>What must already be true for this determination to carry? Atlas terms can be named here.</small>
          <textarea name="retrace" placeholder="This depends on..."></textarea>
        </label>

        <label>
          <span>Missing / skipped dependency</span>
          <small>What dependency may have been skipped?</small>
          <textarea name="missingDependency" placeholder="Missing or skipped dependency..."></textarea>
        </label>

        <section class="atlas-trace" aria-label="Atlas Trace">
          <h2>Atlas Trace</h2>
          <label>
            <span>Atlas entry ids</span>
            <small>Optional manual list of Atlas entry ids involved in this run.</small>
            <textarea name="atlasEntryIds" placeholder="practice.retrace&#10;carrying.pressure"></textarea>
          </label>
          <label>
            <span>Active condition</span>
            <small>The main Atlas condition currently being stood in.</small>
            <textarea name="activeCondition" placeholder="Active condition..."></textarea>
          </label>
          <label>
            <span>Held by</span>
            <small>What this condition depends on / must already hold.</small>
            <textarea name="heldBy" placeholder="Held by..."></textarea>
          </label>
          <label>
            <span>Carries</span>
            <small>What this condition may make available next.</small>
            <textarea name="carries" placeholder="Carries..."></textarea>
          </label>
          <label>
            <span>Trace question</span>
            <small>What dependency must be retraced before determination is warranted?</small>
            <textarea name="traceQuestion" placeholder="What dependency must be retraced?"></textarea>
          </label>
          <label>
            <span>Premature determination risk</span>
            <small>What would be locked too early if I determine now?</small>
            <textarea name="prematureDeterminationRisk" placeholder="What would be locked too early?"></textarea>
          </label>
          <label>
            <span>Warrant statement</span>
            <small>Why can this determination carry at this scope of read?</small>
            <textarea name="warrantStatement" placeholder="This carries at this scope because..."></textarea>
          </label>
        </section>

        <label>
          <span>Clearance</span>
          <small>Is there still too much openness, ambiguity, or uncertainty?</small>
          <textarea name="clearance" placeholder="What must remain open?"></textarea>
        </label>

        <label>
          <span>Held pressure</span>
          <small>What pressure is being carried into bounded hold?</small>
          <textarea name="heldPressure" placeholder="The pressure being held is..."></textarea>
        </label>

        <label>
          <span>Determination</span>
          <small>What can now be temporarily held without pretending finality?</small>
          <textarea name="determination" placeholder="What can now be temporarily held?"></textarea>
        </label>

        <label>
          <span>Scope</span>
          <small>What kind of read is this determination being made within?</small>
          <textarea name="scope" placeholder="At this scope of read..."></textarea>
        </label>

        <label>
          <span>Determination status</span>
          <small>Is pressure still open, provisionally held, or determined at scope?</small>
          <select name="determineStatus">
            <option value="undetermined">Undetermined</option>
            <option value="provisional">Provisional</option>
            <option value="determined">Determined at scope</option>
          </select>
        </label>

        <section class="discernment" aria-label="Discernment">
          <h2>Discernment</h2>
          <label>
            <span>Challenge points</span>
            <small>Where should this determination be tested or questioned?</small>
            <textarea name="challengePoints" placeholder="This determination can be challenged at..."></textarea>
          </label>
          <label>
            <span>Revision path</span>
            <small>How can the determination be corrected if the read changes?</small>
            <textarea name="revisionPath" placeholder="If this fails, revise by..."></textarea>
          </label>
        </section>

        <section class="force-transition" aria-label="Care / Control">
          <h2>Care / Control</h2>
          <label>
            <span>Force read</span>
            <small>What does the generated force become at this scope?</small>
            <select name="forceRead">
              <option value="">Unread</option>
              <option value="unresolved">Unresolved</option>
              <option value="care">Care</option>
              <option value="control">Compatible control</option>
              <option value="control_drift">Control drift</option>
            </select>
          </label>
          <label class="check-field">
            <input type="checkbox" name="availabilityPreserved" />
            <span>Availability is preserved</span>
          </label>
          <label class="check-field">
            <input type="checkbox" name="directedConditionCanCorrectDirection" />
            <span>Directed condition can correct direction</span>
          </label>
          <label>
            <span>Force notes</span>
            <small>What shows care, compatible control, drift, or unresolved force?</small>
            <textarea name="forceNotes" placeholder="The force reads this way because..."></textarea>
          </label>
        </section>

        <label>
          <span>Next step</span>
          <small>What is the smallest answerable movement opened by this determination?</small>
          <textarea name="nextStep" placeholder="The smallest answerable next movement is..."></textarea>
        </label>

        <label>
          <span>Next carrying posture</span>
          <small>What is the next carrying posture?</small>
          <textarea name="nextCarryingPosture" placeholder="Now I can move to..."></textarea>
        </label>

        <section class="register" aria-label="Register">
          <h2>Register</h2>
          <label>
            <span>Determined</span>
            <textarea name="registerDetermined" placeholder="Determined..."></textarea>
          </label>
          <label>
            <span>Still open</span>
            <textarea name="registerStillOpen" placeholder="Still open..."></textarea>
          </label>
          <label>
            <span>Next pressure</span>
            <textarea name="nextPressure" placeholder="Next pressure..."></textarea>
          </label>
        </section>

        <footer class="actions">
          <p id="status" role="status"></p>
          <button type="submit">Save run</button>
        </footer>
      </form>

      <section class="runs" aria-label="Saved runs">
        <h2>Saved Runs</h2>
        <div id="runs-list" class="runs-list"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
