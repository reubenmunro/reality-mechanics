[[routes]]
pattern = "atlas.realitymechanics.nz/*"
zone_name = "realitymechanics.nz"

[[routes]]
pattern = "theory.realitymechanics.nz/*"
zone_name = "realitymechanics.nz"

[[d1_databases]]
binding = "ATLAS_DB"
database_name = "atlas-d1"
database_id = "ffc9622e-02a4-4561-b11e-4e54fac92967"
