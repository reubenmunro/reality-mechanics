name = "super-frost-d434"
main = "main-website-worker.js"
compatibility_date = "2025-06-01"
workers_dev = false

[assets]
directory = "./generated/public"
binding = "ASSETS"
run_worker_first = true

[[routes]]
pattern = "realitymechanics.nz"
