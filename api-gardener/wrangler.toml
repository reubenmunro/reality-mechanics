name = "reality-mechanics-api-gardener"
main = "src/index.js"
compatibility_date = "2026-06-03"
workers_dev = true

[triggers]
crons = ["* * * * *"]

[vars]
GARDEN_PACE = "1"

[[kv_namespaces]]
binding = "GARDEN"
id = "a6d36ff60d0a489ba42faef8e89d6d79"

